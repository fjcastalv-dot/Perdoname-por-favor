<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8f9fa;
        }
        .container {
            text-align: center;
        }
        .btn-rojo {
            padding: 20px 40px;
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
            background-color: #dc3545;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn-rojo:hover {
            background-color: #bd2130;
        }
        .btn-rojo:active {
            transform: scale(0.98);
        }
        #texto-disculpa {
            font-size: 24px;
            font-weight: 500;
            color: #212529;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <button class="btn-rojo" id="boton" onclick="mostrarDisculpa()">Presioname</button>
        
        <h1 id="texto-disculpa">perdoname por favor, te lo ruego</h1>
    </div>

    <script>
        function mostrarDisculpa() {
            // Oculta el botón
            document.getElementById("boton").style.display = "none";
            // Muestra el texto
            document.getElementById("texto-disculpa").style.display = "block";
        }
    </script>

</body>
</html>
