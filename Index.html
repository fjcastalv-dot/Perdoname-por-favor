<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería · Invitados Especiales Graduación 23 Julio 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --navy:#132a45;
    --gold:#c9a24b;
    --gold-soft:#e6d3a0;
    --cream:#f7f3ea;
    --paper:#fffdf8;
    --ink:#20293a;
    --line:#e2d9c4;
    --presidium:#e0a716;
    --presidium-bg:#fff2cc;
    --vip:#4f9d63;
    --vip-bg:#e2efda;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 600px at 50% -10%, #1c3a5e 0%, var(--navy) 55%, #0e1e33 100%);
    min-height:100vh;
    font-family:'Inter',sans-serif;
    color:var(--ink);
    padding:26px 14px 60px;
  }

  .wrap{max-width:960px;margin:0 auto;}

  .masthead{text-align:center;color:var(--cream);margin-bottom:18px;}
  .masthead .seal{
    width:46px;height:46px;margin:0 auto 10px;
    border:2px solid var(--gold);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Playfair Display',serif;color:var(--gold);font-size:20px;
  }
  .masthead h1{font-family:'Playfair Display',serif;font-weight:700;font-size:22px;margin:0 0 4px;}
  .masthead p{margin:0;font-size:12.5px;color:var(--gold-soft);letter-spacing:.5px;text-transform:uppercase;}

  .legend{
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
    margin:16px 0 20px;
  }
  .legend .item{
    display:flex;align-items:center;gap:7px;
    font-size:12px;font-weight:600;color:var(--cream);
    background:rgba(255,255,255,.06);
    border:1px solid rgba(230,211,160,.35);
    padding:6px 12px;border-radius:999px;
  }
  .legend .dot{width:12px;height:12px;border-radius:50%;display:inline-block;}
  .legend .dot.presidium{background:var(--presidium);}
  .legend .dot.vip{background:var(--vip);}

  .toolbar{
    display:flex;
    justify-content:center;
    margin-bottom:16px;
  }
  .toolbar span{
    font-size:12px;color:var(--gold-soft);font-weight:600;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));
    gap:14px;
  }

  .tile{
    background:var(--paper);
    border:2px solid rgba(201,162,75,.35);
    border-radius:14px;
    padding:10px 8px 12px;
    text-align:center;
    cursor:pointer;
    box-shadow:0 10px 22px rgba(0,0,0,.18);
    transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    position:relative;
  }
  .tile:hover{transform:translateY(-3px);box-shadow:0 14px 28px rgba(0,0,0,.28);}
  .tile.presidium{border-color:var(--presidium);background:linear-gradient(180deg,#fffdf8 60%, var(--presidium-bg));}
  .tile.vip{border-color:var(--vip);background:linear-gradient(180deg,#fffdf8 60%, var(--vip-bg));}

  .tile.arrived{opacity:.42;}
  .tile.arrived .name{text-decoration:line-through;}
  .tile.arrived .photo::after{
    content:"✓";
    position:absolute;
    top:6px; left:6px;
    background:var(--navy);
    color:var(--gold-soft);
    width:20px;height:20px;
    border-radius:50%;
    font-size:12px;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;
  }

  .tile .photo{
    width:78px;height:78px;
    border-radius:50%;
    overflow:hidden;
    margin:0 auto 8px;
    border:2.5px solid var(--gold);
    position:relative;
    background:#eee6d2;
  }
  .tile .photo img{width:100%;height:100%;object-fit:cover;display:block;}
  .tile .photo .noimg{
    width:100%;height:100%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Playfair Display',serif;
    font-size:30px;
    color:#a99566;
    background:#f1ead6;
  }
  .tile .name{
    font-size:11.5px;
    font-weight:600;
    color:var(--navy);
    line-height:1.25;
  }

  .arrive-check{
    position:absolute;
    top:6px;right:6px;
    width:22px;height:22px;
    border-radius:50%;
    border:1.5px solid var(--line);
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;
    color:transparent;
    z-index:2;
  }
  .tile.arrived .arrive-check{
    background:var(--navy);
    border-color:var(--navy);
    color:var(--gold-soft);
  }

  /* Modal */
  .overlay{
    position:fixed;inset:0;
    background:rgba(14,25,41,.72);
    display:none;
    align-items:center;justify-content:center;
    padding:20px;
    z-index:50;
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--paper);
    border-radius:20px;
    max-width:340px;
    width:100%;
    padding:28px 26px 26px;
    text-align:center;
    position:relative;
    box-shadow:0 30px 70px rgba(0,0,0,.4);
    border:1px solid var(--gold-soft);
  }
  .modal .close{
    position:absolute;top:12px;right:14px;
    background:none;border:none;
    font-size:20px;color:#9a917c;
    cursor:pointer;
    line-height:1;
  }
  .modal .photo-frame{
    width:150px;height:150px;
    border-radius:50%;
    overflow:hidden;
    border:3px solid var(--gold);
    box-shadow:0 10px 24px rgba(0,0,0,.2);
    margin:0 auto 10px;
    background:#eee6d2;
  }
  .modal .photo-frame img{width:100%;height:100%;object-fit:cover;display:block;}
  .modal .photo-frame .noimg{
    width:100%;height:100%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Playfair Display',serif;
    font-size:52px;
    color:#a99566;
    background:#f1ead6;
  }
  .modal .status-tag{
    display:inline-block;
    font-size:10.5px;
    font-weight:700;
    letter-spacing:.5px;
    padding:4px 12px;
    border-radius:999px;
    margin-bottom:10px;
  }
  .modal .status-tag.presidium{background:var(--presidium-bg);color:#8a6d0f;}
  .modal .status-tag.vip{background:var(--vip-bg);color:#2f6b42;}
  .modal h2{
    font-family:'Playfair Display',serif;
    font-size:21px;
    color:var(--navy);
    margin:4px 0 8px;
    line-height:1.3;
  }
  .modal p.cargo{
    font-size:13.5px;
    color:#5a5344;
    margin:0 0 12px;
    line-height:1.45;
  }
  .modal p.note{
    font-size:12px;
    color:#8a6d0f;
    background:var(--presidium-bg);
    border-radius:8px;
    padding:8px 10px;
    margin:0 0 14px;
  }
  .modal .arrive-btn{
    background:var(--navy);
    color:var(--gold-soft);
    border:none;
    border-radius:999px;
    padding:10px 22px;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
  }
  .modal .arrive-btn.is-arrived{
    background:transparent;
    color:var(--navy);
    border:1.5px solid var(--navy);
  }

  @media (max-width:420px){
    .grid{grid-template-columns:repeat(3, 1fr);}
  }
</style>
</head>

<div class="wrap">
  <div class="masthead">
    <div class="seal">UT</div>
    <h1>Invitados Especiales</h1>
    <p>Graduación · 23 de julio 2026 · Vinculación</p>
  </div>

  <div class="legend">
    <span class="item"><span class="dot presidium"></span>Amarillo · Presidium</span>
    <span class="item"><span class="dot vip"></span>Verde · VIP</span>
  </div>

  <div class="toolbar"><span id="arrivedCount"></span></div>

  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="close" id="closeBtn">&times;</button>
    <div class="photo-frame" id="modalPhotoFrame"></div>

    <p class="cargo" id="modalCargo"></p>
    <div id="modalNote"></div>
    <button class="arrive-btn" id="arriveBtn"></button>
  </div>
</div>

PEOPLE.forEach((p,i) => p._id = i);
const arrivedSet = new Set();

const grid = document.getElementById("grid");

function initials(name){
  return "?";
}

function renderGrid(){
  grid.innerHTML = "";
  PEOPLE.forEach(p => {
    const tile = document.createElement("div");
    tile.className = "tile" + (p.status !== "none" ? " " + p.status : "") + (arrivedSet.has(p._id) ? " arrived" : "");
    const photoHtml = p.img
      ? `<img src="${p.img}" alt="${p.name}">`
      : `<div class="noimg">?</div>`;
    tile.innerHTML = `
      <div class="arrive-check">✓</div>
      <div class="photo">${photoHtml}</div>
      <div class="name">${p.name}</div>
    `;
    tile.querySelector(".arrive-check").onclick = (e) => {
      e.stopPropagation();
      toggleArrived(p._id);
    };
    tile.onclick = () => openModal(p);
    grid.appendChild(tile);
  });
  updateArrivedCount();
}

function toggleArrived(id){
  if(arrivedSet.has(id)) arrivedSet.delete(id);
  else arrivedSet.add(id);
  renderGrid();
  if(overlay.classList.contains("open") && currentPerson && currentPerson._id === id){
    updateArriveBtn();
  }
}

function updateArrivedCount(){
  document.getElementById("arrivedCount").textContent =
    `Han llegado: ${arrivedSet.size} de ${PEOPLE.length}`;
}

const overlay = document.getElementById("overlay");
let currentPerson = null;

function openModal(p){
  currentPerson = p;
  const frame = document.getElementById("modalPhotoFrame");
  frame.innerHTML = p.img ? `<img src="${p.img}" alt="${p.name}">` : `<div class="noimg">?</div>`;

  const tagBox = document.getElementById("modalStatusTag");
  if(p.status === "presidium"){
    tagBox.innerHTML = `<span class="status-tag presidium">PRESIDIUM</span>`;
  } else if(p.status === "vip"){
    tagBox.innerHTML = `<span class="status-tag vip">VIP</span>`;
  } else {
    tagBox.innerHTML = "";
  }

  document.getElementById("modalName").textContent = p.name;
  document.getElementById("modalCargo").textContent = p.cargo;

  const noteBox = document.getElementById("modalNote");
  noteBox.innerHTML = p.note ? `<p class="note">${p.note}</p>` : "";

  updateArriveBtn();
  overlay.classList.add("open");
}

function updateArriveBtn(){
  const btn = document.getElementById("arriveBtn");
  const has = arrivedSet.has(currentPerson._id);
  btn.textContent = has ? "Marcado como llegó ✓ (deshacer)" : "Marcar como llegó";
  btn.className = "arrive-btn" + (has ? " is-arrived" : "");
}

document.getElementById("arriveBtn").onclick = () => {
  toggleArrived(currentPerson._id);
};

document.getElementById("closeBtn").onclick = () => overlay.classList.remove("open");
overlay.onclick = (e) => { if(e.target === overlay) overlay.classList.remove("open"); };

renderGrid();
</script>
